<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Nisha S. | Clinical Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
        }
        .font-serif {
            font-family: 'Playfair Display', serif;
        }
        /* Fluid Typography */
        .hero-title {
            font-size: clamp(2.5rem, 7vw, 6rem);
            line-height: 0.9;
            letter-spacing: -0.04em;
        }
        .hero-subtitle {
            font-size: clamp(2rem, 5vw, 5rem);
            line-height: 1;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        /* Horizontal Scroll for Detailed Slides */
        .slide-container {
            scroll-snap-type: x mandatory;
            display: flex;
            overflow-x: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .slide-container::-webkit-scrollbar { display: none; }
        .slide-item {
            scroll-snap-align: start;
            flex: 0 0 100%;
        }
    </style>
</head>
<body class="bg-white text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                brain: <path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.78-3.06 2.5 2.5 0 0 1-2.41-4.23 2.5 2.5 0 0 1 .15-4.65A2.5 2.5 0 0 1 9.5 2zM14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.78-3.06 2.5 2.5 0 0 0 2.41-4.23 2.5 2.5 0 0 0-.15-4.65A2.5 2.5 0 0 0 14.5 2z"/>,
                activity: <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>,
                target: <><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></>,
                calendar: <><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></>,
                award: <><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></>,
                quote: <><path d="M3 21c3 0 7-1 7-8V5H2v8h5c0 2-2 3-5 3zM14 21c3 0 7-1 7-8V5h-8v8h5c0 2-2 3-5 3z"/></>,
                x: <><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>,
                check: <polyline points="20 6 9 17 4 12"/>,
                arrowRight: <><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name.toLowerCase()] || null}
                </svg>
            );
        };

        const App = () => {
            const [isBookingOpen, setIsBookingOpen] = useState(false);
            const [selectedPackage, setSelectedPackage] = useState(null);
            const [selectedDuration, setSelectedDuration] = useState(60);

            const profileImage = "https://dl.dropboxusercontent.com/scl/fi/ewpc2lckln4aj3mtk171a/b2f83292-2a19-4d21-a85d-87a32adfe635.png?rlkey=6in4ha8j9sdcrwb158klz740f";
            const emailId = "nishasavani0106@gmail.com";
            
            const freeAppointmentUrl = "https://calendar.google.com/calendar/render?action=TEMPLATE&text=Discovery+Call:+Dr.+Nisha+S.&details=Introductory+call+to+discuss+services+and+process.";
            const googleCalendarUrl = "https://calendar.google.com/calendar/render?action=TEMPLATE&text=Consultation+with+Dr.+Nisha+S.&details=Clinical+Psychology+and+Behavioral+Consultation+Inquiry.";

            const consultationPacks = [
                { id: 'clinical', name: 'Clinical Therapy', icon: 'brain', desc: 'Counseling protocols for depression, anxiety, and trauma with medical-grade precision.' },
                { id: 'behavioral', name: 'Behavioral Recovery', icon: 'activity', desc: 'Subconscious reprogramming for neurodiverse individuals and neural pattern reinforcement.' },
                { id: 'remedial', name: 'Pediatric Support', icon: 'target', desc: 'Strategic pediatric interventions utilizing BHMS medical expertise to decode developmental markers.' }
            ];

            const explanations = [
                { title: "Source-Level Healing", content: "By integrating physiological medical insights with advanced behavioral frameworks, we don't just patch symptoms. We restructure the underlying cognitive and biological response patterns to ensure long-term stability and resilience.", icon: "activity" },
                { title: "Neuro-Behavioral Synergy", content: "Our practice bridges the gap between traditional clinical psychology and modern medical biology. This dual approach allows for a deeper understanding of how physical well-being and mental health influence one another synchronously.", icon: "brain" },
                { title: "Remedial Excellence", content: "Specialized pediatric protocols utilize developmental medical markers to identify and address learning barriers or behavioral challenges early, fostering a supportive environment for neurodiverse growth and potential.", icon: "target" }
            ];

            const getPrice = (mins) => ({ 30: 15, 60: 25, 120: 40 }[mins]);

            return (
                <div className="relative">
                    {/* Fixed Navigation */}
                    <nav className="fixed top-0 w-full z-40 px-6 py-4 flex justify-between items-center glass-card border-b border-slate-100">
                        <div className="font-extrabold tracking-tighter text-lg md:text-xl">DR. NISHA S.</div>
                        <div className="flex gap-4">
                            <button onClick={() => window.open(freeAppointmentUrl, '_blank')} className="hidden sm:block text-[10px] font-black uppercase tracking-widest text-slate-500 hover:text-teal-600 transition-colors">Free Discovery</button>
                            <button onClick={() => setIsBookingOpen(true)} className="bg-slate-950 text-white text-[10px] font-bold px-5 py-2.5 rounded-full hover:bg-teal-600 transition-colors uppercase tracking-widest shadow-lg shadow-slate-900/10">
                                One-On-One Support
                            </button>
                        </div>
                    </nav>

                    {/* Hero Section */}
                    <section className="pt-28 pb-16 px-6 md:px-12 max-w-7xl mx-auto min-h-screen flex flex-col justify-center">
                        <div className="grid lg:grid-cols-12 gap-8 md:gap-12 items-center">
                            <div className="lg:col-span-7 space-y-6 md:space-y-8 order-2 lg:order-1">
                                <div className="inline-flex items-center gap-2 bg-teal-50 text-teal-700 px-4 py-2 rounded-full text-[10px] font-black uppercase tracking-widest border border-teal-100">
                                    <Icon name="activity" size={14} /> Global Clinical Practice
                                </div>
                                
                                <h1 className="hero-title font-serif font-medium text-slate-900">
                                    DR. NISHA S. <br/>
                                    <span className="hero-subtitle italic text-teal-600">THE MIND</span> <br/>
                                    RESTRUCTURED.
                                </h1>

                                <p className="max-w-xl text-lg md:text-xl text-slate-600 font-light leading-relaxed">
                                    A multidisciplinary practice unifying <span className="font-bold text-slate-900 italic text-teal-700">Clinical Psychology</span> with the diagnostic depth of <span className="font-bold text-slate-900 italic text-teal-700">Medicine (BHMS)</span> for truly systemic recovery.
                                </p>

                                <div className="flex flex-wrap gap-4 pt-4">
                                    <button onClick={() => window.open(freeAppointmentUrl, '_blank')} className="bg-slate-950 text-white px-8 py-4 rounded-2xl font-bold flex items-center gap-3 hover:bg-teal-600 transition-all shadow-xl group">
                                        FREE APPOINTMENT <Icon name="calendar" size={18} className="group-hover:rotate-12 transition-transform" />
                                    </button>
                                    <button onClick={() => setIsBookingOpen(true)} className="px-8 py-4 border-2 border-slate-950 rounded-2xl font-bold hover:bg-slate-50 transition-all">
                                        ONE-ON-ONE SUPPORT
                                    </button>
                                </div>
                            </div>

                            <div className="lg:col-span-5 flex justify-center lg:justify-end order-1 lg:order-2">
                                {/* REMOVED THICK BORDER, USED OBJECT-COVER TO HIDE EMPTY GAPS */}
                                <div className="relative w-full max-w-[380px] aspect-[4/5] rounded-[3rem] overflow-hidden shadow-2xl bg-white border border-slate-100">
                                    <img 
                                        src={profileImage} 
                                        alt="Dr. Nisha S." 
                                        className="w-full h-full object-cover object-top grayscale hover:grayscale-0 transition-all duration-1000" 
                                    />
                                    <div className="absolute bottom-6 left-6 bg-teal-600 text-white p-5 rounded-2xl shadow-xl -rotate-3 border-2 border-white/20">
                                        <div className="flex items-center gap-3">
                                            <Icon name="award" size={32} />
                                            <div>
                                                <div className="text-xl font-black leading-none mb-1">8+ YRS</div>
                                                <div className="text-[8px] font-bold uppercase tracking-widest opacity-80">Medical Base</div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Methodology Section */}
                    <section className="bg-slate-50 py-20 px-6 md:px-12 border-y border-slate-200">
                        <div className="max-w-7xl mx-auto grid lg:grid-cols-2 gap-12 lg:gap-20 items-center">
                            <div className="space-y-6">
                                <h2 className="text-[10px] font-black uppercase tracking-[0.4em] text-teal-600">Treatment Philosophy</h2>
                                <h3 className="text-4xl font-serif italic leading-tight">Beyond Symptom Management. We Target the Source.</h3>
                                <p className="text-slate-600 leading-relaxed text-lg">Our practice utilizes a systemic medical approach to psychological disorders. By analyzing the biological and behavioral intersection, we create a path to total recovery.</p>
                                <div className="space-y-4 pt-4">
                                    <div className="flex gap-4 items-start">
                                        <div className="p-2 bg-white rounded-lg shadow-sm text-teal-600"><Icon name="check" size={16} /></div>
                                        <p className="text-sm font-semibold text-slate-800">Diagnostic medicine base for systemic cure.</p>
                                    </div>
                                    <div className="flex gap-4 items-start">
                                        <div className="p-2 bg-white rounded-lg shadow-sm text-teal-600"><Icon name="check" size={16} /></div>
                                        <p className="text-sm font-semibold text-slate-800">Clinical ethics matching in-person rigor.</p>
                                    </div>
                                </div>
                            </div>
                            <div className="bg-slate-900 text-white p-10 md:p-14 rounded-[3rem] shadow-2xl relative overflow-hidden">
                                <Icon name="quote" size={60} className="text-teal-500/20 mb-8" />
                                <p className="text-2xl md:text-3xl font-serif italic leading-relaxed relative z-10">
                                    "We don't just manage behaviors; we restore neural harmony by treating the individual as a complete biological system."
                                </p>
                                <div className="mt-10 flex items-center gap-4">
                                    <div className="w-12 h-px bg-teal-500"></div>
                                    <span className="text-[10px] font-bold uppercase tracking-widest text-teal-500">The Recovery Standard</span>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Strategic Pillars Section */}
                    <section className="py-24 px-6 md:px-12 max-w-7xl mx-auto">
                        <div className="text-center mb-16 space-y-4">
                            <h2 className="text-[10px] font-black uppercase tracking-[0.4em] text-slate-400">Clinical Focus</h2>
                            <h3 className="text-4xl md:text-5xl font-serif italic">Strategic Recovery Pillars</h3>
                        </div>
                        <div className="grid md:grid-cols-3 gap-6">
                            {consultationPacks.map(pack => (
                                <div key={pack.id} className="p-10 border border-slate-100 rounded-[3rem] bg-white hover:border-slate-950 transition-all group flex flex-col justify-between h-full shadow-sm">
                                    <Icon name={pack.icon} size={48} className="text-teal-600 mb-10" />
                                    <div>
                                        <h4 className="text-2xl font-black uppercase tracking-tighter mb-4 whitespace-pre-line">{pack.name.split(' ').join('\n')}</h4>
                                        <p className="text-slate-500 text-sm leading-relaxed mb-6">{pack.desc}</p>
                                        <div className="w-10 h-1 bg-teal-500"></div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* Detailed Intervention Slides Section */}
                    <section className="bg-slate-900 py-24 px-6 md:px-12 overflow-hidden">
                        <div className="max-w-7xl mx-auto">
                            <div className="mb-12 flex items-center justify-between">
                                <h3 className="text-white text-3xl font-serif italic">Detailed Interventions</h3>
                                <div className="flex gap-2 text-teal-500 text-[10px] font-black uppercase tracking-widest animate-pulse">
                                    Scroll to Explore <Icon name="arrowRight" size={14} />
                                </div>
                            </div>
                            <div className="slide-container gap-6">
                                {explanations.map((slide, idx) => (
                                    <div key={idx} className="slide-item bg-slate-800/50 border border-slate-700 p-8 md:p-16 rounded-[4rem] text-white">
                                        <div className="flex flex-col md:flex-row gap-12 items-center">
                                            <div className="bg-teal-600/20 p-8 rounded-full border border-teal-500/30">
                                                <Icon name={slide.icon} size={64} className="text-teal-400" />
                                            </div>
                                            <div className="space-y-6 flex-1">
                                                <h4 className="text-4xl font-serif italic text-teal-400">{slide.title}</h4>
                                                <p className="text-xl text-slate-300 font-light leading-relaxed max-w-2xl">
                                                    {slide.content}
                                                </p>
                                                <div className="flex items-center gap-4 text-[10px] font-black tracking-[0.3em] text-slate-500">
                                                    SLIDE 0{idx+1} / 03
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Interactive Footer */}
                    <footer className="py-20 px-6 text-center border-t border-slate-100 bg-white">
                        <div className="space-y-6 mb-12">
                            <h2 className="text-[10px] font-black uppercase tracking-[0.4em] text-slate-400">Consultation Inquiries</h2>
                            <a 
                                href={`mailto:${emailId}`} 
                                className="inline-block text-2xl md:text-4xl font-serif italic text-slate-950 hover:text-teal-600 transition-colors border-b-2 border-slate-100 hover:border-teal-200 pb-2"
                            >
                                {emailId}
                            </a>
                            <p className="text-xs text-slate-400 font-medium">Click above to start a direct consultation inquiry via email.</p>
                        </div>
                        <p className="text-[10px] font-black uppercase tracking-[0.5em] text-slate-300">
                            DR. NISHA S. © CLINICAL PSYCHOLOGY & REMEDIAL EXCELLENCE
                        </p>
                    </footer>

                    {/* Booking Modal */}
                    {isBookingOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
                            <div className="absolute inset-0 bg-slate-950/90 backdrop-blur-sm" onClick={() => setIsBookingOpen(false)}></div>
                            <div className="relative bg-white w-full max-w-4xl max-h-[90vh] overflow-y-auto rounded-[3rem] flex flex-col md:flex-row shadow-2xl">
                                <div className="md:w-1/3 bg-slate-950 text-white p-10 flex flex-col justify-between">
                                    <div>
                                        <div className="bg-teal-500 w-fit p-3 rounded-2xl mb-8"><Icon name="calendar" /></div>
                                        <h2 className="text-2xl font-serif italic mb-4">Support Selector</h2>
                                        <p className="text-slate-400 text-xs leading-relaxed">Dedicated sessions for established clinical needs.</p>
                                    </div>
                                    <div className="space-y-4 mt-8">
                                        <div className="flex items-center gap-3 text-[10px] font-bold uppercase tracking-widest text-teal-400">
                                            <Icon name="check" size={14}/> Clinical Assessment
                                        </div>
                                        <div className="flex items-center gap-3 text-[10px] font-bold uppercase tracking-widest text-teal-400">
                                            <Icon name="check" size={14}/> Behavioral Plan
                                        </div>
                                    </div>
                                </div>
                                <div className="md:w-2/3 p-8 md:p-12">
                                    <div className="flex justify-between items-center mb-8">
                                        <h3 className="text-[10px] font-black uppercase tracking-widest text-slate-400">Step 1: Choose Protocol</h3>
                                        <button onClick={() => setIsBookingOpen(false)} className="text-slate-300 hover:text-slate-900"><Icon name="x" size={24}/></button>
                                    </div>
                                    <div className="grid grid-cols-3 gap-3 mb-8">
                                        {consultationPacks.map(pack => (
                                            <button 
                                                key={pack.id} 
                                                onClick={() => setSelectedPackage(pack)}
                                                className={`p-4 rounded-2xl border-2 transition-all flex flex-col items-center gap-2 ${selectedPackage?.id === pack.id ? 'border-teal-500 bg-teal-50 text-teal-700' : 'border-slate-100 hover:border-slate-200'}`}
                                            >
                                                <Icon name={pack.icon} size={24} />
                                                <span className="text-[9px] font-black uppercase tracking-tighter text-center leading-none">{pack.name}</span>
                                            </button>
                                        ))}
                                    </div>
                                    <div className="flex gap-3 mb-8">
                                        {[30, 60, 120].map(d => (
                                            <button 
                                                key={d} 
                                                onClick={() => setSelectedDuration(d)}
                                                className={`flex-1 py-4 rounded-xl border-2 font-bold transition-all text-sm ${selectedDuration === d ? 'bg-slate-950 text-white border-slate-950' : 'border-slate-100'}`}
                                            >
                                                {d}m
                                            </button>
                                        ))}
                                    </div>
                                    <div className="bg-slate-50 p-6 rounded-2xl flex justify-between items-center mb-8">
                                        <div className="text-[10px] font-black uppercase tracking-widest text-slate-400">Professional Rate</div>
                                        <div className="text-3xl font-serif italic">${getPrice(selectedDuration)} <span className="text-sm font-sans not-italic text-slate-400">USD</span></div>
                                    </div>
                                    <button 
                                        disabled={!selectedPackage}
                                        onClick={() => window.open(googleCalendarUrl, '_blank')}
                                        className="w-full bg-teal-600 text-white py-5 rounded-2xl font-black text-lg hover:bg-teal-700 disabled:bg-slate-100 transition-all shadow-xl shadow-teal-600/20"
                                    >
                                        SECURE THIS SESSION
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
